<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyberpunk Tetris</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
        
        body {
            background-color: #0b0c10;
            color: #66fcf1;
            font-family: 'Orbitron', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            background-image: 
                linear-gradient(rgba(11, 12, 16, 0.9), rgba(11, 12, 16, 0.9)),
                var(--grid-pattern);
        }

        :root {
            --grid-pattern: repeating-linear-gradient(
                45deg,
                #1f2833 0,
                #1f2833 1px,
                transparent 0,
                transparent 50px
            );
        }

        .game-wrapper {
            display: flex;
            gap: 30px;
            align-items: flex-start;
        }

        .board-container {
            border: 4px solid #ff00ff;
            box-shadow: 0 0 15px #ff00ff, inset 0 0 15px #ff00ff;
            background: rgba(0, 0, 0, 0.8);
            border-radius: 5px;
            padding: 5px;
        }

        canvas {
            display: block;
            background: linear-gradient(180deg, rgba(31,40,51,0.5) 0%, rgba(11,12,16,1) 100%);
        }

        .ui-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 200px;
        }

        .hud-box {
            border: 2px solid #00ffff;
            background: rgba(0, 255, 255, 0.05);
            padding: 15px;
            box-shadow: 0 0 10px #00ffff, inset 0 0 10px #00ffff;
            text-align: center;
            border-radius: 5px;
            backdrop-filter: blur(5px);
        }

        h2.neon-pink {
            margin: 0 0 10px 0;
            color: #ff00ff;
            text-shadow: 0 0 5px #ff00ff, 0 0 15px #ff00ff;
            font-size: 1.2rem;
            text-transform: uppercase;
        }

        .score-val, .level-val {
            font-size: 2rem;
            color: #fcee0a;
            text-shadow: 0 0 10px #fcee0a, 0 0 20px #fcee0a;
            font-weight: 900;
        }

        .controls {
            margin-top: 20px;
            font-size: 0.8rem;
            color: #c5c6c7;
            text-align: left;
            line-height: 1.5;
        }
        
        .controls span {
            color: #66fcf1;
            font-weight: bold;
            display: inline-block;
            width: 20px;
        }

        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ff003c;
            font-size: 3rem;
            text-shadow: 0 0 20px #ff003c, 0 0 40px #ff003c;
            display: none;
            font-weight: 900;
            text-align: center;
            background: rgba(11, 12, 16, 0.9);
            padding: 20px;
            border: 2px solid #ff003c;
            border-radius: 10px;
            z-index: 10;
        }

        .scanlines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                rgba(18, 16, 16, 0) 50%,
                rgba(0, 0, 0, 0.25) 50%
            );
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 100;
        }
    </style>
</head>
<body>
    <div class="scanlines"></div>
    <div class="game-wrapper">
        <div class="board-container">
            <canvas id="tetris" width="300" height="600"></canvas>
        </div>
        
        <div class="ui-panel">
            <div class="hud-box">
                <h2 class="neon-pink">Score</h2>
                <div id="score" class="score-val">0</div>
            </div>
            
            <div class="hud-box">
                <h2 class="neon-pink">Nível</h2>
                <div id="level" class="level-val">1</div>
            </div>

            <div class="hud-box controls">
                <h2 class="neon-pink" style="font-size: 1rem;">Controles</h2>
                <p><span>◀▶</span> Mover</p>
                <p><span>▲</span> Rotacionar</p>
                <p><span>▼</span> Descer</p>
            </div>
        </div>
    </div>

    <div id="game-over" class="game-over">
        FIM DE JOGO
        <div style="font-size: 1rem; color: #fff; margin-top: 10px; text-shadow: none;">Pressione <span style="color:#00ffff">Enter</span> para reiniciar</div>
    </div>

    <script>
        const canvas = document.getElementById('tetris');
        const context = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const levelElement = document.getElementById('level');
        const gameOverElement = document.getElementById('game-over');

        context.scale(30, 30); // 10 colunas x 20 linhas (300x600)

        function arenaSweep() {
            let rowCount = 1;
            let clearedLines = 0;
            outer: for (let y = arena.length - 1; y >= 0; y--) {
                for (let x = 0; x < arena[y].length; x++) {
                    if (arena[y][x] === 0) {
                        continue outer;
                    }
                }
                const row = arena.splice(y, 1)[0].fill(0);
                arena.unshift(row);
                y++;
                player.score += rowCount * 100;
                rowCount *= 2;
                clearedLines++;
            }
            if (clearedLines > 0) {
                player.lines += clearedLines;
                player.level = Math.floor(player.lines / 5) + 1;
                dropInterval = Math.max(100, 1000 - (player.level - 1) * 100);
            }
        }

        function collide(arena, player) {
            const [m, o] = [player.matrix, player.pos];
            for (let y = 0; y < m.length; y++) {
                for (let x = 0; x < m[y].length; x++) {
                    if (m[y][x] !== 0 &&
                        (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) {
                        return true;
                    }
                }
            }
            return false;
        }

        function createMatrix(w, h) {
            const matrix = [];
            while (h--) {
                matrix.push(new Array(w).fill(0));
            }
            return matrix;
        }

        function createPiece(type) {
            if (type === 'T') return [[0,0,0], [1,1,1], [0,1,0]];
            if (type === 'O') return [[2,2], [2,2]];
            if (type === 'L') return [[0,3,0], [0,3,0], [0,3,3]];
            if (type === 'J') return [[0,4,0], [0,4,0], [4,4,0]];
            if (type === 'I') return [[0,5,0,0], [0,5,0,0], [0,5,0,0], [0,5,0,0]];
            if (type === 'S') return [[0,6,6], [6,6,0], [0,0,0]];
            if (type === 'Z') return [[7,7,0], [0,7,7], [0,0,0]];
        }

        function drawMatrix(matrix, offset) {
            matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        context.fillStyle = colors[value];
                        // Efeito Neon Cyberpunk
                        context.shadowBlur = 15;
                        context.shadowColor = colors[value];
                        context.fillRect(x + offset.x, y + offset.y, 1, 1);
                        
                        // Detalhes internos da peça para parecer mais tecnológica
                        context.shadowBlur = 0;
                        context.fillStyle = 'rgba(255, 255, 255, 0.3)';
                        context.fillRect(x + offset.x + 0.1, y + offset.y + 0.1, 0.8, 0.8);
                        
                        // Bordas
                        context.lineWidth = 0.05;
                        context.strokeStyle = 'rgba(0, 0, 0, 0.5)';
                        context.strokeRect(x + offset.x, y + offset.y, 1, 1);
                    }
                });
            });
        }

        function drawBackground() {
            context.fillStyle = '#000';
            context.fillRect(0, 0, canvas.width, canvas.height);
            
            // Grade Cyberpunk subjacente
            context.strokeStyle = 'rgba(102, 252, 241, 0.05)';
            context.lineWidth = 0.02;
            context.shadowBlur = 0;
            for(let i=0; i<=10; i++){
                context.beginPath();
                context.moveTo(i, 0);
                context.lineTo(i, 20);
                context.stroke();
            }
            for(let j=0; j<=20; j++){
                context.beginPath();
                context.moveTo(0, j);
                context.lineTo(10, j);
                context.stroke();
            }
        }

        function draw() {
            context.shadowBlur = 0;
            context.clearRect(0, 0, canvas.width, canvas.height);
            drawBackground();
            drawMatrix(arena, {x: 0, y: 0});
            if(!isGameOver) {
                drawMatrix(player.matrix, player.pos);
            }
        }

        function merge(arena, player) {
            player.matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        arena[y + player.pos.y][x + player.pos.x] = value;
                    }
                });
            });
        }

        function playerDrop() {
            if(isGameOver) return;
            player.pos.y++;
            if (collide(arena, player)) {
                player.pos.y--;
                merge(arena, player);
                playerReset();
                arenaSweep();
                updateScore();
            }
            dropCounter = 0;
        }

        function playerMove(dir) {
            if(isGameOver) return;
            player.pos.x += dir;
            if (collide(arena, player)) {
                player.pos.x -= dir;
            }
        }

        function playerReset() {
            const pieces = 'ILJOTSZ';
            player.matrix = createPiece(pieces[pieces.length * Math.random() | 0]);
            player.pos.y = 0;
            player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);
            
            if (collide(arena, player)) {
                arena.forEach(row => row.fill(0));
                player.score = 0;
                player.level = 1;
                player.lines = 0;
                dropInterval = 1000;
                updateScore();
                isGameOver = true;
                gameOverElement.style.display = 'block';
            }
        }

        function playerRotate(dir) {
            if(isGameOver) return;
            const pos = player.pos.x;
            let offset = 1;
            rotate(player.matrix, dir);
            while (collide(arena, player)) {
                player.pos.x += offset;
                offset = -(offset + (offset > 0 ? 1 : -1));
                if (offset > player.matrix[0].length) {
                    rotate(player.matrix, -dir);
                    player.pos.x = pos;
                    return;
                }
            }
        }

        function rotate(matrix, dir) {
            for (let y = 0; y < matrix.length; ++y) {
                for (let x = 0; x < y; ++x) {
                    [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
                }
            }
            if (dir > 0) {
                matrix.forEach(row => row.reverse());
            } else {
                matrix.reverse();
            }
        }

        function restartGame() {
            arena.forEach(row => row.fill(0));
            player.score = 0;
            player.level = 1;
            player.lines = 0;
            dropInterval = 1000;
            isGameOver = false;
            gameOverElement.style.display = 'none';
            updateScore();
            playerReset();
            update();
        }

        let dropCounter = 0;
        let dropInterval = 1000;
        let lastTime = 0;
        let isGameOver = false;

        function update(time = 0) {
            if(isGameOver) return;
            const deltaTime = time - lastTime;
            lastTime = time;

            dropCounter += deltaTime;
            if (dropCounter > dropInterval) {
                playerDrop();
            }

            draw();
            requestAnimationFrame(update);
        }

        function updateScore() {
            scoreElement.innerText = player.score;
            levelElement.innerText = player.level;
        }

        const colors = [
            null,
            '#ff00ff', // T - Pink
            '#fcee0a', // O - Yellow
            '#ff9900', // L - Orange
            '#0000ff', // J - Blue
            '#00ffff', // I - Cyan
            '#00ff00', // S - Green
            '#ff003c'  // Z - Red
        ];

        const arena = createMatrix(10, 20);

        const player = {
            pos: {x: 0, y: 0},
            matrix: null,
            score: 0,
            level: 1,
            lines: 0
        };

        document.addEventListener('keydown', event => {
            if (event.keyCode === 37) { // Left
                playerMove(-1);
            } else if (event.keyCode === 39) { // Right
                playerMove(1);
            } else if (event.keyCode === 40) { // Down
                playerDrop();
            } else if (event.keyCode === 38) { // Up
                playerRotate(1);
            } else if (event.keyCode === 13 && isGameOver) { // Enter
                restartGame();
            }
        });

        playerReset();
        updateScore();
        update();
    </script>
</body>
</html>
